<!DOCTYPE html>
<html>
<head>
  <title>Survey Form</title>
  <link rel="stylesheet" href="./styles.css">
  </head>
<body>
  <header class="top">
  <h1 id="title">freeCodeCamp Survey Form</h1>
  <p id="description">Thank you for taking the time to help us improve the platform</p>
  </header>
  <main class="center">
  <form id="survey-form">
    <fieldset class="field">
      <label class="label" id="name-label">Name<input type="text" id="name" required class="input" placeholder="jhon duo"></label>
      <label class="label" id="email-label">Email <input type="email" required class="input" id="email" placeholder="dumb@gmail.com"></label>
      <label class="label" id="number-label">Age <input type="number" class="input" id="number" min="13" max="120" placeholder="21"></label>
      <label></label>
    </fieldset>  
    
    <fieldset class="field">
      <label class="label">Which option best describes your current role?<select class="select" id="dropdown">
      <option value="">Select current role</option>
      <option value="1">Student</option> 
      <option value="2">Full Time Job</option>
      <option value="3">Full Time Learner</option>
      <option value="4">Prefer Not to Say</option> 
      <option value="5">Other</option>
      </select>
    </label>
    <label class="label">Would you recommend freeCodeCamp to a friend?</label>
    <label class="label"><input type="radio" name="survey" value="1"> Definately</label>
    <label class="label"><input type="radio" name="survey" value="2"> Maybe</label>
    <label class="label"><input type="radio" name="survey" value="3"> Not Sure</label>
    
    <label class="label">What would you like to see improved? (Check all that apply)</style></label>
    <label class="label"><input type="checkbox" name="survey2" value="1"> Definately</label>
    <label class="label"><input type="checkbox" name="survey2" value="2"> Maybe</label>
    <label class="label"><input type="checkbox" name="survey2" value="3"> Not Sure</label>

    <label class="label">Any comments or suggestions?
      <br />
    <textarea id="textarea" rows="4" cols="50" placeholder="Please enter comments here: "></textarea>
    </label>
    </fieldset>  
    
    </form>
    <input type="submit" id="submit" value="Submit" class="input">
  </main>
  </body>
<html>
